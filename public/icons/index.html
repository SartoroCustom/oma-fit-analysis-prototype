<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OMA Order Icon System</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1c2926;background:#f3f6f5}*{box-sizing:border-box}body{margin:0;padding:48px}main{max-width:1180px;margin:auto}header{margin-bottom:28px}h1{margin:0;font-size:30px;letter-spacing:-.03em}header p{margin:8px 0 0;color:#697572;font-size:14px}.sheet{overflow:hidden;border:1px solid #dce5e2;border-radius:16px;background:#fff;box-shadow:0 16px 50px rgba(31,55,49,.08)}.row{min-height:92px;padding:16px 20px;display:grid;grid-template-columns:220px repeat(5,minmax(112px,1fr));align-items:center;gap:12px;border-bottom:1px solid #edf1f0}.row:last-child{border-bottom:0}.name{font-size:14px;font-weight:750}.name small{display:block;margin-top:4px;color:#89928f;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}.state{min-height:58px;padding:8px;border:1px solid #edf1f0;border-radius:10px;display:flex;align-items:center;gap:10px;background:#fbfcfc;text-decoration:none}.state:hover{border-color:#b8cec8;background:#f4f9f7}.state img{width:36px;height:36px;flex:0 0 36px}.state span{color:#52605c;font-size:11px;font-weight:650;line-height:1.25}.empty{border-color:transparent;background:transparent}@media(max-width:850px){body{padding:20px}.sheet{overflow-x:auto}.row{min-width:950px}}
  </style>
</head>
<body><main><header><h1>OMA Order Icon System</h1><p>32 × 32 SVG · consistent 1.6px stroke · inactive and operational states</p></header><section class="sheet" id="sheet"></section></main>
<script>
const rows=[
['Priority Shipping',[['Inactive','priority-shipping-inactive.svg'],['Active','priority-shipping-active.svg']]],
['Rush Shipping',[['Inactive','rush-shipping-inactive.svg'],['Active','rush-shipping-active.svg']]],
['Returning Customer',[['Inactive','returning-customer-inactive.svg'],['Same Fit Profile','returning-customer-same-fit-profile.svg'],['Different Fit Profile','returning-customer-different-fit-profile.svg']]],
['Multiple Active Orders',[['Inactive','multiple-active-orders-inactive.svg'],['Active','multiple-active-orders-active.svg']]],
['Customer Order Notes',[['Inactive','customer-order-notes-inactive.svg'],['Active','customer-order-notes-active.svg']]],
['Custom Lining',[['Inactive','custom-lining-inactive.svg'],['Active','custom-lining-active.svg']]],
['Wedding Party',[['Inactive','wedding-party-inactive.svg'],['Active','wedding-party-active.svg']]],
['Fit Reconfirmation',[['Inactive','fit-reconfirmation-inactive.svg'],['In Progress','fit-reconfirmation-in-progress.svg'],['Completed','fit-reconfirmation-completed.svg']]],
['Adjustments & Fit Requests',[['Inactive','adjustments-fit-requests-inactive.svg'],['Manual','adjustments-fit-requests-manually-activated.svg'],['Alteration reimbursement','adjustments-fit-requests-alteration-reimbursement.svg'],['Remake','adjustments-fit-requests-remake.svg'],['Adjust My Fit','adjustments-fit-requests-adjust-my-fit.svg']]],
];
document.querySelector('#sheet').innerHTML=rows.map(([name,states])=>`<div class="row"><div class="name">${name}<small>${states.length} states · click to download</small></div>${states.map(([label,file])=>`<a class="state" href="${file}" download><img src="${file}" alt=""><span>${label}</span></a>`).join('')}${'<div class="state empty"></div>'.repeat(5-states.length)}</div>`).join('');
</script></body></html>
